server {
    listen 80;
    listen 8080;
    server_name businesszap.com.br www.businesszap.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://businesszap.com.br$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name businesszap.com.br www.businesszap.com.br;

    ssl_certificate /etc/letsencrypt/live/businesszap.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/businesszap.com.br/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Static Assets & SPA Routing
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy to Backend (mesmo host; API pública planejada: api.businesszap.com.br)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
