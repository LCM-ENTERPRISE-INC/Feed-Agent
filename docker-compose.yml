services:
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        NGINX_CONF: ${NGINX_CONF:-nginx.http.conf}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public-network
      - private-network
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # TLS helper — only with: docker compose --profile tls up -d
  # Do not enable before DNS + certificates exist.
  certbot:
    image: certbot/certbot
    profiles: ["tls"]
    restart: "no"
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot

  backend:
    build:
      context: ./back-end
      target: runner
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-please-change-this-jwt-secret-key-32-chars}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-feed_agent}?schema=public
      - MONGODB_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-root123}@mongodb:27017/${DB_NAME:-feed_agent}?authSource=admin
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DATABASE_SCHEMA_MODE=${DATABASE_SCHEMA_MODE:-push}
      - TRUST_PROXY_HOPS=${TRUST_PROXY_HOPS:-1}
      - APP_DOMAIN=${APP_DOMAIN:-businesszap.com.br}
      - API_DOMAIN=${API_DOMAIN:-api.businesszap.com.br}
      - ENABLE_TLS=${ENABLE_TLS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public-network
      - private-network
    volumes:
      - wa_sessions:/app/sessions
      - wa_uploads:/app/uploads
      - ./back-end/models:/app/models
      - app_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin123}
      - POSTGRES_DB=${DB_NAME:-feed_agent}
    networks:
      - private-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:6-jammy
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-root123}
      - MONGO_INITDB_DATABASE=${DB_NAME:-feed_agent}
    networks:
      - private-network
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - private-network
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  mongodata:
  redisdata:
  wa_sessions:
  wa_uploads:
  app_logs:

networks:
  public-network:
    driver: bridge
  private-network:
    driver: bridge
    internal: true
